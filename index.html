<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ─── SEO Meta Tags ──────────────────────────────────────── -->
    <!-- HINWEIS: Diese Tags werden dynamisch durch react-helmet oder
         manuelle Anpassung pro Seite gesetzt. Die Werte hier sind Fallbacks. -->
    <title>[FIRMENNAME] – [SLOGAN]</title>
    <meta name="description" content="[META-BESCHREIBUNG – ca. 150 Zeichen]" />
    <meta name="keywords"    content="[KEYWORD1], [KEYWORD2], [KEYWORD3], [ORT]" />
    <meta name="author"      content="[FIRMENNAME]" />
    <meta name="robots"      content="index, follow" />
    <link rel="canonical"    href="https://[DOMAIN].de" />

    <!-- ─── Open Graph (Social Media) ────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://[DOMAIN].de" />
    <meta property="og:title"       content="[FIRMENNAME] – [SLOGAN]" />
    <meta property="og:description" content="[OG BESCHREIBUNG]" />
    <meta property="og:image"       content="https://[DOMAIN].de/images/og-image.jpg" />
    <meta property="og:locale"      content="de_DE" />
    <meta property="og:site_name"   content="[FIRMENNAME]" />

    <!-- ─── Twitter Card ──────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="[FIRMENNAME] – [SLOGAN]" />
    <meta name="twitter:description" content="[OG BESCHREIBUNG]" />
    <meta name="twitter:image"       content="https://[DOMAIN].de/images/og-image.jpg" />

    <!-- ─── Favicon ───────────────────────────────────────────── -->
    <link rel="icon"             type="image/x-icon"   href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180"       href="/apple-touch-icon.png" />

    <!-- ─── Theme Color ───────────────────────────────────────── -->
    <meta name="theme-color" content="#08070a" />

    <!-- ─── Structured Data (JSON-LD) ────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name":        "[FIRMENNAME]",
      "description": "[META-BESCHREIBUNG]",
      "url":         "https://[DOMAIN].de",
      "telephone":   "[TELEFONNUMMER]",
      "email":       "[EMAIL@DOMAIN.DE]",
      "address": {
        "@type":           "PostalAddress",
        "streetAddress":   "[STRAßE & HAUSNUMMER]",
        "addressLocality": "[ORT]",
        "postalCode":      "[PLZ]",
        "addressCountry":  "DE"
      },
      "openingHoursSpecification": [
        {
          "@type":     "OpeningHoursSpecification",
          "dayOfWeek": ["Tuesday", "Wednesday", "Thursday", "Friday"],
          "opens":     "09:00",
          "closes":    "18:00"
        },
        {
          "@type":     "OpeningHoursSpecification",
          "dayOfWeek": "Saturday",
          "opens":     "10:00",
          "closes":    "16:00"
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
